# nginx front for RagBook (US-20): serves the Angular SPA and reverse-proxies /api to the API container, so the
# browser talks to a single origin (no CORS). Streaming (SSE at /api/chat/ask) requires proxy buffering off.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API — reverse proxy to the API service. Buffering off so Server-Sent Events stream token-by-token; a long
    # read timeout keeps a slow answer's stream open (paired with the app's heartbeat).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA — everything else falls back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
